name: Release DataWeave Native CLI
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:

  # This workflow contains a single job called "build"
  RELEASE_EXTENSION:
    strategy:
      matrix:
#        os: [macos-latest, ubuntu-latest, windows-latest]
#        os: [ macos-latest, ubuntu-latest ]
        os: [ ubuntu-latest ]
        include:
#          - os: windows-latest
#            script_name: windows
          - os: ubuntu-latest
            script_name: linux
 #         - os: macos-latest
 #           script_name: osx
    runs-on: ${{ matrix.os }}

    # Set permissions
#    permissions:
#      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Setup Graalvm
      - name: Setup Graalvm
        uses: graalvm/setup-graalvm@v1
        with:
#          version: ${{env.GRAALVM_VERSION}}
          java-version: '24'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Guess Extension Version
        run: |
          echo "NATIVE_VERSION=$(echo '${{github.ref}}' | sed -e 's,.*/v\(.*\),\1,')" >> $GITHUB_ENV
        shell: bash

      # Create Release
      - name: Create Release
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          body: "Example body"
          draft: true
          prerelease: false

      # Runs a single command using the runners shell
 #     - name: Run Build
 #       run: |
 #         ./gradlew --stacktrace --no-problems-report build -PnativeVersion=${{env.NATIVE_VERSION}}
 #       shell: bash

      # Generate distro
#      - name: Create Distro
#        run: ./gradlew --stacktrace --no-problems-report native-cli:distro -PnativeVersion=${{env.NATIVE_VERSION}}
#        shell: bash

