name: Release DataWeave Native CLI

on: workflow_dispatch

jobs:

  # This workflow contains a single job called "build"
  RELEASE_EXTENSION:
    strategy:
      matrix:
#        os: [macos-latest, ubuntu-latest, windows-latest]
        os: [ macos-latest, ubuntu-latest ]
        include:
#          - os: windows-latest
#            script_name: windows
          - os: ubuntu-latest
            script_name: linux
          - os: macos-latest
            script_name: osx
    runs-on: ${{ matrix.os }}
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4

      # Check tag
      - name: Check Tag
        id: check-tag
        run: |
          echo "Check tag ${{ github.event.ref }}"
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "match=true" >> $GITHUB_OUTPUT
          fi 

      # Setup Gradle
      - name: Setup Gradle
        if: steps.check-tag.outputs.match == 'true'
        uses: gradle/actions/setup-gradle@v3

      # Setup Graalvm
      - name: Setup Graalvm
        if: steps.check-tag.outputs.match == 'true'
        uses: graalvm/setup-graalvm@v1
        with:
#          version: ${{env.GRAALVM_VERSION}}
          java-version: '24'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Guess Extension Version
        if: steps.check-tag.outputs.match == 'true'
        run: |
          echo "NATIVE_VERSION=$(echo '${{github.ref}}' | sed -e 's,.*/v\(.*\),\1,')" >> $GITHUB_ENV
        shell: bash
      
      # Runs a single command using the runners shell
      - name: Run Build
        if: steps.check-tag.outputs.match == 'true'
        run: |
          ./gradlew --stacktrace --no-problems-report build -PnativeVersion=${{env.NATIVE_VERSION}}
        shell: bash
      
      # Generate distro
      - name: Create Distro
        if: steps.check-tag.outputs.match == 'true'
        run: ./gradlew --stacktrace --no-problems-report native-cli:distro -PnativeVersion=${{env.NATIVE_VERSION}}
        shell: bash

      # Upload the artifact file
      - name: Upload binaries to release
        if: steps.check-tag.outputs.match == 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: native-cli/build/distributions/native-cli-${{env.NATIVE_VERSION}}-native-distro-${{ matrix.script_name }}.zip
          asset_name: dw-${{env.NATIVE_VERSION}}-${{runner.os}}
          tag: ${{ github.ref }}
          overwrite: true

